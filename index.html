<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>Vintage CCD Cam</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

  <main id="camera-screen">
    <!-- Live camera preview (camera.js writes the MediaStream here) -->
    <video id="preview" playsinline autoplay muted></video>

    <!-- Working canvas used for capture + pixel processing (canvas.js) -->
    <canvas id="capture-canvas" hidden></canvas>

    <!-- Result canvas / preview shown right after a shot is processed -->
    <canvas id="result-canvas" hidden></canvas>

    <div id="controls">
      <button id="switch-btn" type="button" aria-label="Switch camera">&#8635;</button>
      <button id="shutter-btn" type="button" aria-label="Capture photo"></button>
      <button id="gallery-btn" type="button" aria-label="Saved photos">&#9638;</button>
    </div>

    <div id="status" hidden></div>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
